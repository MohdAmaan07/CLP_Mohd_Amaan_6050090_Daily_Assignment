spring.application.name=gateway
server.port=8080

eureka.client.service-url.defaultZone=http://localhost:8761/eureka/
eureka.instance.prefer-ip-address=true

spring.cloud.gateway.server.webflux.discovery.locator.enabled=false
spring.cloud.gateway.server.webflux.globalcors.add-to-simple-url-handler-mapping=true
spring.cloud.gateway.server.webflux.globalcors.cors-configurations.[/**].allowed-origin-patterns=*
spring.cloud.gateway.server.webflux.globalcors.cors-configurations.[/**].allowed-methods=GET,POST,PUT,DELETE,OPTIONS,PATCH
spring.cloud.gateway.server.webflux.globalcors.cors-configurations.[/**].allowed-headers=*
spring.cloud.gateway.server.webflux.globalcors.cors-configurations.[/**].exposed-headers=*
spring.cloud.gateway.server.webflux.globalcors.cors-configurations.[/**].allow-credentials=true

spring.cloud.gateway.server.webflux.routes[0].id=product-api
spring.cloud.gateway.server.webflux.routes[0].uri=lb://product
spring.cloud.gateway.server.webflux.routes[0].predicates[0]=Path=/catalogs/products/**

spring.cloud.gateway.server.webflux.routes[1].id=cart-api
spring.cloud.gateway.server.webflux.routes[1].uri=lb://cart
spring.cloud.gateway.server.webflux.routes[1].predicates[0]=Path=/carts/**

spring.cloud.gateway.server.webflux.routes[2].id=recommendation-api
spring.cloud.gateway.server.webflux.routes[2].uri=lb://recommendation
spring.cloud.gateway.server.webflux.routes[2].predicates[0]=Path=/recommendations/**

# swagger ui in gateway
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.urls[0].name=product
springdoc.swagger-ui.urls[0].url=/product/v3/api-docs
springdoc.swagger-ui.urls[1].name=cart
springdoc.swagger-ui.urls[1].url=/cart/v3/api-docs
springdoc.swagger-ui.urls[2].name=recommendation
springdoc.swagger-ui.urls[2].url=/recommendation/v3/api-docs

# docs routes via gateway
spring.cloud.gateway.server.webflux.routes[3].id=product-docs
spring.cloud.gateway.server.webflux.routes[3].uri=lb://product
spring.cloud.gateway.server.webflux.routes[3].predicates[0]=Path=/product/v3/api-docs
spring.cloud.gateway.server.webflux.routes[3].filters[0]=SetPath=/v3/api-docs

spring.cloud.gateway.server.webflux.routes[4].id=cart-docs
spring.cloud.gateway.server.webflux.routes[4].uri=lb://cart
spring.cloud.gateway.server.webflux.routes[4].predicates[0]=Path=/cart/v3/api-docs
spring.cloud.gateway.server.webflux.routes[4].filters[0]=SetPath=/v3/api-docs

spring.cloud.gateway.server.webflux.routes[5].id=recommendation-docs
spring.cloud.gateway.server.webflux.routes[5].uri=lb://recommendation
spring.cloud.gateway.server.webflux.routes[5].predicates[0]=Path=/recommendation/v3/api-docs
spring.cloud.gateway.server.webflux.routes[5].filters[0]=SetPath=/v3/api-docs

management.endpoints.web.exposure.include=*
management.endpoint.health.show-details=always

